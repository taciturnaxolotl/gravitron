<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tank Drive Controller</title>
<script type="importmap">
{
  "imports": {
    "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs"
  }
}
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 24px;
  }
  h1 { font-size: 1.5rem; font-weight: 500; letter-spacing: 0.5px; }

  #status-bar {
    display: none;
    gap: 16px;
    align-items: center;
  }
  #status-bar.open { display: flex; }
  #status-toggle {
    margin-top: -8px;
  }
  .indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.85rem;
  }
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #444;
    transition: background 0.3s;
  }
  .dot.on { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
  .dot.warn { background: #facc15; box-shadow: 0 0 6px #facc15; }
  .dot.off { background: #444; }

  #controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  button {
    background: #1e1e1e;
    color: #e0e0e0;
    border: 1px solid #333;
    padding: 10px 28px;
    border-radius: 6px;
    font-size: 0.95rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #2a2a2a; }
  button:active { background: #333; }

  .meter {
    display: flex;
    gap: 32px;
    align-items: flex-end;
    height: 160px;
  }
  .bar-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .bar {
    width: 32px;
    background: #222;
    border-radius: 4px;
    position: relative;
    height: 120px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
  }
  .bar-center {
    position: absolute;
    left: 0;
    right: 0;
    height: 2px;
    background: #444;
    top: 50%;
  }
  .fill {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 50%;
    background: #60a5fa;
    transition: height 0.05s linear;
  }
  .fill-neg {
    position: absolute;
    left: 0;
    right: 0;
    top: 50%;
    background: #60a5fa;
    transition: height 0.05s linear;
  }
  .fill.right { background: #f472b6; }
  .fill-neg.right { background: #f472b6; }
  .label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #888; }
  .val { font-size: 0.7rem; color: #aaa; font-variant-numeric: tabular-nums; width: 3ch; text-align: right; }

  #log {
    font-size: 0.7rem;
    color: #555;
    max-height: 80px;
    overflow-y: auto;
    width: 280px;
    text-align: center;
  }

  #camera-wrap {
    display: none;
    position: relative;
    width: min(90vw, 640px);
    aspect-ratio: 4/3;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #333;
  }
  #camera-wrap.active { display: block; }
  #cam-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }
  #cam-canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }
  #hand-status {
    position: absolute;
    bottom: 6px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.7rem;
    color: #aaa;
    background: rgba(0,0,0,0.6);
    padding: 2px 8px;
    border-radius: 4px;
  }

  .input-toggle {
    display: flex;
    gap: 0;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid #333;
  }
  .input-toggle button {
    border: none;
    border-radius: 0;
    padding: 8px 18px;
    font-size: 0.85rem;
  }
  .input-toggle button.active {
    background: #3b82f6;
    color: #fff;
  }
</style>
</head>
<body>

<h1>Robot Tank Drive</h1>

<div id="status-bar">
  <div class="indicator">
    <div class="dot off" id="serial-dot"></div>
    <span id="serial-label">Serial</span>
  </div>
  <div class="indicator">
    <div class="dot off" id="gamepad-dot"></div>
    <span id="gamepad-label">Gamepad</span>
  </div>
  <div class="indicator">
    <div class="dot off" id="stream-dot"></div>
    <span id="stream-label">Tx</span>
  </div>
  <div class="indicator">
    <div class="dot off" id="radio-dot"></div>
    <span id="radio-label">Rx</span>
  </div>
  <div class="indicator">
    <div class="dot off" id="rtrip-dot"></div>
    <span id="rtrip-label">Ard</span>
  </div>
</div>

<div style="display: flex; gap: 12px; align-items: center;">
  <button id="connect-btn">Connect Serial</button>
  <div class="input-toggle">
    <button id="mode-gamepad">Gamepad</button>
    <button id="mode-hands" class="active">Hands</button>
  </div>
  <button id="status-toggle">Status</button>
</div>

<div id="camera-wrap">
  <video id="cam-video" autoplay playsinline></video>
  <canvas id="cam-canvas"></canvas>
  <div id="hand-status">Loading model...</div>
</div>

<div id="controls">
  <div class="meter">
    <div class="bar-wrap">
      <div class="bar"><div class="bar-center"></div><div class="fill" id="left-fill"></div><div class="fill-neg" id="left-fill-neg"></div></div>
      <div class="val" id="left-val">0</div>
      <div class="label">Left</div>
    </div>
    <div class="bar-wrap">
      <div class="bar"><div class="bar-center"></div><div class="fill right" id="right-fill"></div><div class="fill-neg right" id="right-fill-neg"></div></div>
      <div class="val" id="right-val">0</div>
      <div class="label">Right</div>
    </div>
  </div>
</div>

<div id="log"></div>

<script type="module">
import { FilesetResolver, HandLandmarker } from "@mediapipe/tasks-vision";

const DZ = 0.08;
const RATE_HZ = 20;

const serialDot   = document.getElementById('serial-dot');
const serialLabel = document.getElementById('serial-label');
const gamepadDot  = document.getElementById('gamepad-dot');
const gamepadLabel = document.getElementById('gamepad-label');
const streamDot   = document.getElementById('stream-dot');
const streamLabel = document.getElementById('stream-label');
const radioDot    = document.getElementById('radio-dot');
const radioLabel  = document.getElementById('radio-label');
const rtripDot    = document.getElementById('rtrip-dot');
const rtripLabel  = document.getElementById('rtrip-label');
const leftFill    = document.getElementById('left-fill');
const leftFillNeg = document.getElementById('left-fill-neg');
const rightFill   = document.getElementById('right-fill');
const rightFillNeg = document.getElementById('right-fill-neg');
const leftVal     = document.getElementById('left-val');
const rightVal    = document.getElementById('right-val');
const logEl       = document.getElementById('log');
const connectBtn  = document.getElementById('connect-btn');

let writer = null;
let writing = false;
let port = null;
let reader = null;
let lastAck = 0;
let lastRadio = 0;
let radioFail = false;
let readerClosed = false;
let smoothAck = 0;
let smoothRadio = 0;
const ALPHA = 0.15;

let inputMode = 'hands'; // 'gamepad' | 'hands'
let handLandmarker = null;
let handStream = null;
let handInputs = { left: 0, right: 0, buttons: 0 };
let lastHandDetect = 0;
let handsCameraStarted = false;

const camVideo = document.getElementById('cam-video');
const camCanvas = document.getElementById('cam-canvas');
const camCtx = camCanvas.getContext('2d');
const cameraWrap = document.getElementById('camera-wrap');
const handStatusEl = document.getElementById('hand-status');
const modeGamepadBtn = document.getElementById('mode-gamepad');
const modeHandsBtn = document.getElementById('mode-hands');

function setDot(el, cls) {
  el.className = 'dot ' + cls;
}

function startReader() {
  if (!port || reader) return;
  reader = port.readable.getReader();
  readerClosed = false;
  (async function readLoop() {
    try {
      while (!readerClosed) {
        const { value, done } = await reader.read();
        if (done) break;
        for (let i = 0; i < value.length; i++) {
          const b = value[i];
          if (b === 0xAC) {
            lastAck = Date.now();
          } else if (b === 0xAE) {
            lastRadio = Date.now();
            radioFail = false;
          } else if (b === 0xAD) {
            radioFail = true;
          }
        }
      }
    } catch (e) {
      // reader will be cleaned up on disconnect
    }
  })();
}

function stopReader() {
  readerClosed = true;
  if (reader) {
    reader.cancel().catch(() => {});
    reader = null;
  }
}

function log(msg) {
  const now = new Date().toLocaleTimeString();
  logEl.textContent = `[${now}] ${msg}`;
}

function crc8(bytes) {
  let crc = 0;
  for (const b of bytes) {
    crc ^= b;
    for (let i = 0; i < 8; i++)
      crc = (crc & 0x80) ? ((crc << 1) ^ 0x31) & 0xFF : (crc << 1) & 0xFF;
  }
  return crc;
}

function deadzone(v) {
  return Math.abs(v) < DZ ? 0 : v;
}

let storedThrottle = 0;
let driving = false;

const PINCH_CLOSE = 0.09;
const THROTTLE_ZONE = 0.2; // left 20% of frame

function isClenched(landmarks) {
  const thumb = landmarks[4];
  const index = landmarks[8];
  const dx = thumb.x - index.x;
  const dy = thumb.y - index.y;
  const dz = thumb.z - index.z;
  return Math.sqrt(dx*dx + dy*dy + dz*dz) < PINCH_CLOSE;
}

function drawOverlay(results, steer, throttle, driving) {
  camCanvas.width = camVideo.videoWidth;
  camCanvas.height = camVideo.videoHeight;
  const w = camCanvas.width, h = camCanvas.height;
  camCtx.clearRect(0, 0, w, h);

  // Mirror helper: camera landmarks have x=0 on left of camera frame,
  // but the video is CSS-mirrored so x=0 appears on the RIGHT of screen.
  // Canvas is NOT mirrored, so we flip x to match the mirrored video.
  const mx = (nx) => w - nx * w;  // normalized -> pixel, mirrored
  const mxp = (px) => w - px;     // pixel -> pixel, mirrored

  // Zone divider — throttle is camera-left (x < 0.2) which appears on screen-RIGHT
  const zoneXpx = mx(THROTTLE_ZONE); // screen-right side
  camCtx.strokeStyle = '#555';
  camCtx.lineWidth = 1;
  camCtx.setLineDash([4, 4]);
  camCtx.beginPath();
  camCtx.moveTo(zoneXpx, 0);
  camCtx.lineTo(zoneXpx, h);
  camCtx.stroke();
  camCtx.setLineDash([]);

  camCtx.fillStyle = '#555';
  camCtx.font = '11px sans-serif';
  camCtx.textAlign = 'center';
  camCtx.fillText('THROTTLE', (zoneXpx + w) / 2, h - 8);
  camCtx.fillText('STEER', zoneXpx / 2, h - 8);

  // Draw hand landmarks
  if (results.landmarks) {
    for (const hand of results.landmarks) {
      camCtx.fillStyle = '#4ade80';
      for (const pt of hand) {
        camCtx.beginPath();
        camCtx.arc(mx(pt.x), pt.y * h, 3, 0, 2 * Math.PI);
        camCtx.fill();
      }
    }
  }

  // Steer line between hands in steer zone
  if (results.landmarks) {
    const steerHands = results.landmarks.filter(lm => lm[9].x >= THROTTLE_ZONE);
    if (steerHands.length === 2) {
      const c0 = { x: mx(steerHands[0][9].x), y: steerHands[0][9].y * h };
      const c1 = { x: mx(steerHands[1][9].x), y: steerHands[1][9].y * h };
      camCtx.strokeStyle = driving ? '#facc15' : '#666';
      camCtx.lineWidth = 3;
      camCtx.beginPath();
      camCtx.moveTo(c0.x, c0.y);
      camCtx.lineTo(c1.x, c1.y);
      camCtx.stroke();
    }
  }

  // Throttle bar — drawn on screen-right (camera-left zone)
  const barMargin = 10;
  const barW = (w - zoneXpx) - 2 * barMargin;
  const barX = zoneXpx + barMargin;
  const barH = h - 40;
  const barY = 20;
  const fillH = throttle * barH;
  camCtx.strokeStyle = '#555';
  camCtx.lineWidth = 2;
  camCtx.strokeRect(barX, barY, barW, barH);
  camCtx.fillStyle = driving ? '#4ade80' : '#ef4444';
  camCtx.fillRect(barX, barY + barH - fillH, barW, fillH);
  camCtx.font = 'bold 14px monospace';
  camCtx.textAlign = 'center';
  camCtx.fillStyle = driving ? '#4ade80' : '#ef4444';
  camCtx.fillText(
    driving ? Math.round(throttle * 100) + '%' : (throttle > 0 ? Math.round(throttle * 100) + '% STOPPED' : 'STOPPED'),
    barX + barW / 2,
    barY - 6
  );
}

function processHands(results) {
  const statusParts = [];
  let steer = 0;
  let left = 0, right = 0;

  // Separate hands into throttle zone (left 20%) and steer zone (right 80%)
  let throttleHand = null;
  const steerHands = [];

  if (results.landmarks) {
    for (const lm of results.landmarks) {
      if (lm[9].x < THROTTLE_ZONE) {
        throttleHand = lm;
      } else {
        steerHands.push(lm);
      }
    }
  }

  // Throttle: pinch in left zone sets value, persists on release
  if (throttleHand && isClenched(throttleHand)) {
    storedThrottle = Math.max(0, Math.min(1, 1 - throttleHand[0].y / 0.9));
    statusParts.push('Throttle:' + Math.round(storedThrottle * 100) + '%');
  } else if (throttleHand) {
    statusParts.push('Throttle:' + Math.round(storedThrottle * 100) + '% (set)');
  }

  // Steer: both hands in steer zone, both clenched
  driving = false;
  if (steerHands.length >= 2) {
    const h0 = steerHands[0], h1 = steerHands[1];
    const bothClenched = isClenched(h0) && isClenched(h1);
    if (bothClenched) {
      const lx = h0[9].x, ly = h0[9].y;
      const rx = h1[9].x, ry = h1[9].y;
      const dx = rx - lx, dy = ry - ly;
      steer = Math.max(-1, Math.min(1, dy / Math.max(Math.abs(dx), 0.15)));
      driving = true;
      statusParts.push('Steer:' + (steer >= 0 ? '+' : '') + Math.round(steer * 100) + '%');
    } else {
      statusParts.push('Open hands — stopped');
    }
  } else if (steerHands.length === 1) {
    statusParts.push('Need 2 hands to steer');
  }

  // Apply motor output only when driving
  if (driving && storedThrottle > 0) {
    left  = Math.max(-1, Math.min(1, storedThrottle * (1 + steer)));
    right = Math.max(-1, Math.min(1, storedThrottle * (1 - steer)));
  }

  drawOverlay(results, steer, storedThrottle, driving);

  handInputs = { left, right, buttons: 0 };
  lastHandDetect = Date.now();
  handStatusEl.textContent = statusParts.length ? statusParts.join('  ') : 'No hands detected';
}

async function initHandTracking() {
  try {
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm"
    );
    handLandmarker = await HandLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
        delegate: "GPU"
      },
      numHands: 2,
      runningMode: "VIDEO",
    });
    handStatusEl.textContent = 'Model ready';
    log('Hand tracking model loaded');
  } catch (e) {
    handStatusEl.textContent = 'Model failed';
    log('Hand tracking error: ' + e.message);
  }
}

async function startCamera() {
  if (handStream) return;
  try {
    handStream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: 'user' } });
    camVideo.srcObject = handStream;
    cameraWrap.classList.add('active');
    if (!handLandmarker) {
      await initHandTracking();
    }
    runHandLoop();
  } catch (e) {
    log('Camera error: ' + e.message);
  }
}

function stopCamera() {
  if (handStream) {
    handStream.getTracks().forEach(t => t.stop());
    handStream = null;
  }
  camVideo.srcObject = null;
  cameraWrap.classList.remove('active');
  handInputs = { left: 0, right: 0, buttons: 0 };
}

let handLoopRunning = false;
function runHandLoop() {
  if (handLoopRunning) return;
  handLoopRunning = true;
  function step() {
    if (inputMode !== 'hands' || !handLandmarker || !handStream) {
      handLoopRunning = false;
      return;
    }
    if (camVideo.readyState >= 2) {
      const results = handLandmarker.detectForVideo(camVideo, performance.now());
      processHands(results);
    }
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function buildFrame(leftFloat, rightFloat, buttons = 0) {
  const l = Math.round(Math.max(-1, Math.min(1, deadzone(leftFloat))) * 127);
  const r = Math.round(Math.max(-1, Math.min(1, deadzone(rightFloat))) * 127);
  const payload = new Uint8Array([
    new Int8Array([l])[0],
    new Int8Array([r])[0],
    buttons & 0xFF,
  ]);
  return new Uint8Array([0xAB, ...payload, crc8(payload)]);
}

function getGamepadInputs(gp) {
  const lt = gp.buttons[6].value;   // left trigger  → left forward
  const rt = gp.buttons[7].value;   // right trigger → right forward
  const rev = gp.buttons[1].pressed; // B button      → reverse both

  return {
    left:    rev ? -lt : lt,
    right:   rev ? -rt : rt,
    buttons: gp.buttons.reduce((mask, b, i) => mask | (b.pressed ? 1 << i : 0), 0),
  };
}

function updateBars(leftFloat, rightFloat) {
  const l = deadzone(leftFloat);
  const r = deadzone(rightFloat);

  if (l >= 0) {
    leftFill.style.height = (l * 50) + '%';
    leftFillNeg.style.height = '0';
  } else {
    leftFill.style.height = '0';
    leftFillNeg.style.height = (-l * 50) + '%';
  }

  if (r >= 0) {
    rightFill.style.height = (r * 50) + '%';
    rightFillNeg.style.height = '0';
  } else {
    rightFill.style.height = '0';
    rightFillNeg.style.height = (-r * 50) + '%';
  }

  leftVal.textContent  = Math.round(l * 127);
  rightVal.textContent = Math.round(r * 127);
}

async function tick() {
  let inputs = null;

  if (inputMode === 'hands') {
    if (Date.now() - lastHandDetect < 500) {
      inputs = handInputs;
      setDot(gamepadDot, 'on');
      gamepadLabel.textContent = 'Hand tracking';
    } else {
      setDot(gamepadDot, 'off');
      gamepadLabel.textContent = 'No hands';
    }
  } else {
    const gp = navigator.getGamepads().find(g => g);
    if (gp) {
      inputs = getGamepadInputs(gp);
      setDot(gamepadDot, 'on');
      gamepadLabel.textContent = gp.id.slice(0, 30);
    }
  }

  if (inputs) {
    updateBars(inputs.left, inputs.right);

    // Transmitter: web → ESP32 serial write OK
    // Receiver: ESP-NOW radio link (0xAE = success, 0xAD = fail)
    if (writer && lastRadio > 0) {
      const radioDelta = Date.now() - lastRadio;
      smoothRadio = smoothRadio === 0 ? radioDelta : smoothRadio + ALPHA * (radioDelta - smoothRadio);
      const r = Math.round(smoothRadio);
      if (radioFail) {
        setDot(radioDot, 'warn');
        radioLabel.textContent = 'Drop';
      } else if (radioDelta < 200) {
        setDot(radioDot, 'on');
        radioLabel.textContent = String(r).padStart(3) + 'ms';
      } else if (radioDelta < 500) {
        setDot(radioDot, 'warn');
        radioLabel.textContent = String(r).padStart(3) + 'ms';
      } else {
        setDot(radioDot, 'off');
        radioLabel.textContent = String(r).padStart(3) + 'ms';
      }
    } else if (writer) {
      setDot(radioDot, 'off');
      radioLabel.textContent = '---ms';
    }

    // Arduino round trip (0xAC comes back from Arduino via receiver)
    const since = Date.now() - lastAck;
    if (writer && lastAck > 0) {
      smoothAck = smoothAck === 0 ? since : smoothAck + ALPHA * (since - smoothAck);
      const a = Math.round(smoothAck);
      if (since < 200) setDot(rtripDot, 'on');
      else if (since < 500) setDot(rtripDot, 'warn');
      else setDot(rtripDot, 'off');
      rtripLabel.textContent = String(a).padStart(3) + 'ms';
    } else if (writer) {
      setDot(rtripDot, 'off');
      rtripLabel.textContent = '---ms';
    }

    if (writer && !writing) {
      writing = true;
      try {
        await writer.write(buildFrame(inputs.left, inputs.right, inputs.buttons & 0xFF));
        setDot(streamDot, 'on');
      } catch (e) {
        setDot(streamDot, 'warn');
        log('Write error: ' + e.message);
      }
      writing = false;
    }
  } else {
    if (inputMode === 'gamepad') {
      setDot(gamepadDot, 'off');
      gamepadLabel.textContent = 'No gamepad';
    }
    updateBars(0, 0);
  }
  setTimeout(tick, 1000 / RATE_HZ);
}

async function connectSerial(existingPort) {
  try {
    const p = existingPort || await navigator.serial.requestPort();
    await p.open({ baudRate: 921600 });
    port = p;
    writer = port.writable.getWriter();
    setDot(serialDot, 'on');
    serialLabel.textContent = 'Serial connected';
    connectBtn.textContent = 'Connected';
    connectBtn.disabled = true;
    log('Serial opened at 921600');
    startReader();

    port.addEventListener('disconnect', () => {
      setDot(serialDot, 'off');
      setDot(radioDot, 'off');
      setDot(rtripDot, 'off');
      serialLabel.textContent = 'Serial disconnected';
      connectBtn.textContent = 'Connect Serial';
      connectBtn.disabled = false;
      stopReader();
      writer = null;
      port = null;
      log('Serial disconnected');
    });
  } catch (e) {
    setDot(serialDot, 'off');
    log('Serial error: ' + e.message);
  }
}

connectBtn.onclick = () => connectSerial();

window.addEventListener('gamepadconnected', e => {
  setDot(gamepadDot, 'on');
  gamepadLabel.textContent = e.gamepad.id.slice(0, 30);
  log('Gamepad: ' + e.gamepad.id);
});

window.addEventListener('gamepaddisconnected', e => {
  setDot(gamepadDot, 'off');
  gamepadLabel.textContent = 'Gamepad disconnected';
  updateBars(0, 0);
  log('Gamepad disconnected');
});

const statusToggle = document.getElementById('status-toggle');
const statusBar = document.getElementById('status-bar');
statusToggle.onclick = () => {
  statusBar.classList.toggle('open');
};

modeGamepadBtn.onclick = () => {
  inputMode = 'gamepad';
  modeGamepadBtn.classList.add('active');
  modeHandsBtn.classList.remove('active');
  stopCamera();
};

modeHandsBtn.onclick = async () => {
  inputMode = 'hands';
  modeHandsBtn.classList.add('active');
  modeGamepadBtn.classList.remove('active');
  await startCamera();
};

tick();

(async function autoConnect() {
  const ports = await navigator.serial.getPorts();
  if (ports.length > 0) {
    log('Auto-connecting to paired device...');
    await connectSerial(ports[0]);
  }
})();
</script>
</body>
