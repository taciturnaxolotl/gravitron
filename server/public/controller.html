<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K2-B4 Control</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<script type="importmap">
{
  "imports": {
    "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs",
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.min.js"
  }
}
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 24px;
  }
  h1 { font-size: 1.5rem; font-weight: 500; letter-spacing: 0.5px; }

  #status-bar {
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.85rem;
  }
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #444;
    transition: background 0.3s;
  }
  .dot.on { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
  .dot.warn { background: #facc15; box-shadow: 0 0 6px #facc15; }
  .dot.off { background: #444; }

  #controls {
    display: none;
  }

  #main-display {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .side-bar {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .side-bar .bar {
    width: 28px;
    height: 200px;
    background: #222;
    border-radius: 4px;
    position: relative;
    overflow: hidden;
  }
  .side-bar .bar-center {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: #444;
    top: 50%;
  }
  .side-bar .fill {
    position: absolute;
    left: 0; right: 0;
    bottom: 50%;
    background: #60a5fa;
    transition: height 0.05s linear;
  }
  .side-bar .fill-neg {
    position: absolute;
    left: 0; right: 0;
    top: 50%;
    background: #60a5fa;
    transition: height 0.05s linear;
  }
  .side-bar .fill.right { background: #f472b6; }
  .side-bar .fill-neg.right { background: #f472b6; }
  .side-bar .val {

  .side-bar .label {
    font-size: 0.65rem;

  button {

  .meter {
    display: flex;

  }
  .bar-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .bar {
    width: 32px;
    background: #222;
    border-radius: 4px;
    position: relative;
    height: 120px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
  }
  .bar-center {
    position: absolute;
    left: 0;
    right: 0;
    height: 2px;
    background: #444;
    top: 50%;
  }
  .fill {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 50%;
    background: #60a5fa;
    transition: height 0.05s linear;
  }
  .fill-neg {

  .fill.right { background: #f472b6; }

  .label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #888; }
  .val { font-size: 0.7rem; color: #aaa; font-variant-numeric: tabular-nums; width: 3ch; text-align: right; }

  #log {

  }

  #camera-wrap {
    position: relative;
    width: min(90vw, 640px);

  #camera-wrap.hidden { display: none; }
  #camera-wrap.active #cam-prompt { display: none; }
  #cam-prompt {

<div id="main-display">
  <div class="side-bar">

<script type="module">
import { FilesetResolver, HandLandmarker } from "@mediapipe/tasks-vision";
import * as THREE from "three";

const DZ = 0.08;
const RATE_HZ = 20;

const serialDot   = document.getElementById('serial-dot');
const serialLabel = document.getElementById('serial-label');
const gamepadDot  = document.getElementById('gamepad-dot');
const gamepadLabel = document.getElementById('gamepad-label');
const streamDot   = document.getElementById('stream-dot');
const streamLabel = document.getElementById('stream-label');
const radioDot    = document.getElementById('radio-dot');
const radioLabel  = document.getElementById('radio-label');
const rtripDot    = document.getElementById('rtrip-dot');
const rtripLabel  = document.getElementById('rtrip-label');
const leftFill    = document.getElementById('left-fill');
const leftFillNeg = document.getElementById('left-fill-neg');
const rightFill   = document.getElementById('right-fill');
const rightFillNeg = document.getElementById('right-fill-neg');
const leftVal     = document.getElementById('left-val');
const rightVal    = document.getElementById('right-val');
const logEl       = document.getElementById('log');
const lockBtn     = document.getElementById('lock-btn');
const lockDot     = document.getElementById('lock-dot');
const driverCountEl = document.getElementById('driver-count');
const myNameEl    = document.getElementById('my-name');
const queueStatusEl = document.getElementById('queue-status');

let hasLock = false;
let inQueue = false;
let lastAck = 0;
let lastRadio = 0;
let radioFail = false;
let smoothAck = 0;
let smoothRadio = 0;
const ALPHA = 0.15;

let inputMode = 'hands'; // 'gamepad' | 'hands'
let estopped = false;
let handLandmarker = null;
let handStream = null;
let handInputs = { left: 0, right: 0, buttons: 0 };
let lastHandDetect = 0;
let handsCameraStarted = false;

const phoneVideo = document.getElementById('phone-video');
const camVideo = document.getElementById('cam-video');
const camCanvas = document.getElementById('cam-canvas');
const camCtx = camCanvas.getContext('2d');
const cameraWrap = document.getElementById('camera-wrap');
const handStatusEl = document.getElementById('hand-status');
const modeGamepadBtn = document.getElementById('mode-gamepad');
const modeHandsBtn = document.getElementById('mode-hands');

function setDot(el, cls) {
  el.className = 'dot ' + cls;
}

const countdownBanner = document.getElementById('countdown-banner');
function updateCountdown(secondsLeft, hasQueue) {
  if (!hasLock) { countdownBanner.style.display = 'none'; return; }
  if (secondsLeft > 15 && !hasQueue) { countdownBanner.style.display = 'none'; return; }
  countdownBanner.style.display = 'block';
  const urgent = secondsLeft <= 10;
  countdownBanner.style.background = urgent ? '#7f1d1d' : '#78350f';
  countdownBanner.style.color = urgent ? '#fca5a5' : '#fbbf24';
  countdownBanner.textContent = hasQueue
    ? `⏱ Control releases in ${secondsLeft}s — someone is waiting`
    : `⏱ Inactive — control releases in ${secondsLeft}s`;
}

function log(msg) {
  const now = new Date().toLocaleTimeString();
  logEl.textContent = `[${now}] ${msg}`;
}
function handleAckBytes(bytes) {
  for (const b of bytes) {
    if (b === 0xAC) {
      lastAck = Date.now();
    } else if (b === 0xAE) {
      lastRadio = Date.now();
      radioFail = false;
    } else if (b === 0xAD) {
      radioFail = true;
    }
  }
}

function crc8(bytes) {
  let crc = 0;
  for (const b of bytes) {
    crc ^= b;
    for (let i = 0; i < 8; i++)
      crc = (crc & 0x80) ? ((crc << 1) ^ 0x31) & 0xFF : (crc << 1) & 0xFF;
  }
  return crc;
}

function deadzone(v) {
  return Math.abs(v) < DZ ? 0 : v;
}

let driving = false;

const PINCH_CLOSE = 0.09;
const CLAP_CLOSE = 0.18;       // hands this close = clap
const CLAP_WINDOW_MS = 600;    // two claps must happen within this window
const CLAP_COOLDOWN_MS = 1000; // ignore claps for this long after a double-clap

let lastClapTime = 0;
let clapCount = 0;
let clapCooldownUntil = 0;
let handsWereSeparated = true; // debounce: must separate before next clap counts

function checkClap(results) {
  if (Date.now() < clapCooldownUntil) return;
  if (!results.landmarks || results.landmarks.length < 2) {
    handsWereSeparated = true;
    return;
  }
  const h0 = results.landmarks[0], h1 = results.landmarks[1];
  const dx = h0[9].x - h1[9].x, dy = h0[9].y - h1[9].y;
  const dist = Math.sqrt(dx*dx + dy*dy);

  if (dist < CLAP_CLOSE && handsWereSeparated) {
    handsWereSeparated = false;
    const now = Date.now();
    if (now - lastClapTime < CLAP_WINDOW_MS) {
      clapCount++;
      if (clapCount >= 2) {
        clapCount = 0;
        clapCooldownUntil = now + CLAP_COOLDOWN_MS;
        toggleTorch();
      }
    } else {
      clapCount = 1;
    }
    lastClapTime = now;
  } else if (dist > CLAP_CLOSE * 1.5) {
    handsWereSeparated = true;
  }
}

function toggleTorch() {
  torchOn = !torchOn;
  const toast = document.getElementById('torch-toast');
  toast.innerHTML = torchOn
    ? `<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 13v1"/><path d="M17 2a1 1 0 0 1 1 1v4a3 3 0 0 1-.6 1.8l-.6.8A4 4 0 0 0 16 12v8a2 2 0 0 1-2 2H10a2 2 0 0 1-2-2v-8a4 4 0 0 0-.8-2.4l-.6-.8A3 3 0 0 1 6 7V3a1 1 0 0 1 1-1z"/><path d="M6 6h12"/></svg>`
    : `<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11.652 6H18"/><path d="M12 13v1"/><path d="M16 16v4a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2v-8a4 4 0 0 0-.8-2.4l-.6-.8A3 3 0 0 1 6 7V6"/><path d="m2 2 20 20"/><path d="M7.649 2H17a1 1 0 0 1 1 1v4a3 3 0 0 1-.6 1.8l-.6.8a4 4 0 0 0-.55 1.007"/></svg>`;
  toast.style.display = 'block';
  setTimeout(() => { toast.style.display = 'none'; }, 900);
  if (signalingWs && signalingWs.readyState === 1) {
    signalingWs.send(JSON.stringify({ type: 'torch', on: torchOn }));
  }
}

function isClenched(landmarks) {
  const thumb = landmarks[4];
  const index = landmarks[8];
  const dx = thumb.x - index.x;
  const dy = thumb.y - index.y;
  const dz = thumb.z - index.z;
  return Math.sqrt(dx*dx + dy*dy + dz*dz) < PINCH_CLOSE;
}

function drawOverlay(results, steer, throttle, driving) {
  const vw = phoneVideo.videoWidth || camVideo.videoWidth;
  const vh = phoneVideo.videoHeight || camVideo.videoHeight;
  camCanvas.width = vw;
  camCanvas.height = vh;
  const w = camCanvas.width, h = camCanvas.height;
  camCtx.clearRect(0, 0, w, h);

  // Mirror helper: camera landmarks have x=0 on left of camera frame,
  // but the video is CSS-mirrored so x=0 appears on the RIGHT of screen.
  // Canvas is NOT mirrored, so we flip x to match the mirrored video.
  const mx = (nx) => w - nx * w;  // normalized -> pixel, mirrored

  // Draw hand landmarks with skeleton
  const HAND_CONNECTIONS = [
    [0,1],[1,2],[2,3],[3,4],       // thumb
    [0,5],[5,6],[6,7],[7,8],       // index
    [0,9],[9,10],[10,11],[11,12],  // middle
    [0,13],[13,14],[14,15],[15,16],// ring
    [0,17],[17,18],[18,19],[19,20],// pinky
    [5,9],[9,13],[13,17],          // palm knuckles
  ];
  if (results.landmarks) {
    for (const hand of results.landmarks) {
      camCtx.strokeStyle = 'rgba(74,222,128,0.5)';
      camCtx.lineWidth = 1.5;
      for (const [a, b] of HAND_CONNECTIONS) {
        camCtx.beginPath();
        camCtx.moveTo(mx(hand[a].x), hand[a].y * h);
        camCtx.lineTo(mx(hand[b].x), hand[b].y * h);
        camCtx.stroke();
      }
      for (let i = 0; i < hand.length; i++) {
        const pt = hand[i];
        const isTip = [4,8,12,16,20].includes(i);
        camCtx.beginPath();
        camCtx.arc(mx(pt.x), pt.y * h, isTip ? 5 : 3, 0, 2 * Math.PI);
        camCtx.fillStyle = isTip ? '#facc15' : '#4ade80';
        camCtx.fill();
      }
    }
  }

  // Handlebar line between the two hands
  if (results.landmarks && results.landmarks.length >= 2) {
    const sorted = [...results.landmarks].sort((a, b) => a[9].x - b[9].x);
    const c0 = { x: mx(sorted[0][9].x), y: sorted[0][9].y * h };
    const c1 = { x: mx(sorted[1][9].x), y: sorted[1][9].y * h };
    camCtx.strokeStyle = driving ? '#facc15' : '#666';
    camCtx.lineWidth = 3;
    camCtx.beginPath();
    camCtx.moveTo(c0.x, c0.y);
    camCtx.lineTo(c1.x, c1.y);
    camCtx.stroke();

    // Center dot showing throttle position
    const cx = (c0.x + c1.x) / 2;
    const cy = (c0.y + c1.y) / 2;
    camCtx.beginPath();
    camCtx.arc(cx, cy, 6, 0, 2 * Math.PI);
    camCtx.fillStyle = driving ? '#facc15' : '#666';
    camCtx.fill();
  }

  // Throttle zone markers — horizontal lines at 20% and 80% of frame height
  camCtx.strokeStyle = '#444';
  camCtx.lineWidth = 1;
  camCtx.setLineDash([4, 4]);
  camCtx.beginPath(); camCtx.moveTo(0, h * 0.2); camCtx.lineTo(w, h * 0.2); camCtx.stroke();
  camCtx.beginPath(); camCtx.moveTo(0, h * 0.8); camCtx.lineTo(w, h * 0.8); camCtx.stroke();
  camCtx.setLineDash([]);
  camCtx.fillStyle = '#444';
  camCtx.font = '11px sans-serif';
  camCtx.textAlign = 'left';
  camCtx.fillText('fast', 6, h * 0.2 - 4);
  camCtx.fillText('slow', 6, h * 0.8 - 4);
}

function processHands(results) {
  const statusParts = [];
  let steer = 0;
  let throttle = 0;
  let left = 0, right = 0;

  // Separate hands into throttle zone (left 20%) and steer zone (right 80%)
  // All hands are steer hands now — no throttle zone
  const steerHands = [];

  if (results.landmarks) {
    for (const lm of results.landmarks) {
      steerHands.push(lm);
    }
  }

  // Steer: both hands clenched, handlebar line controls everything.
  // Center-Y of the line → throttle (bottom 80%=0, top 20%=1).
  // Tilt angle → steering. Steer authority decreases at high speed so
  // low position = slow tank-spin, high position = fast gentle arcs.
  driving = false;
  if (steerHands.length > 2) {
    statusParts.push('⚠ Too many hands');
  } else if (steerHands.length >= 2) {
    steerHands.sort((a, b) => a[9].x - b[9].x);
    const h0 = steerHands[0], h1 = steerHands[1];
    const bothClenched = isClenched(h0) && isClenched(h1);

    // Warn if hands are too close to the camera — measure wrist-to-middle-finger span
    const handSpan = (lm) => {
      const dx = lm[12].x - lm[0].x, dy = lm[12].y - lm[0].y;
      return Math.sqrt(dx*dx + dy*dy);
    };
    const TOO_CLOSE = 0.35;
    const tooClose = handSpan(h0) > TOO_CLOSE || handSpan(h1) > TOO_CLOSE;
    if (tooClose) {
      statusParts.push('⚠ Move hands back');
      driving = false;
    } else if (bothClenched) {
      const lx = h0[9].x, ly = h0[9].y;
      const rx = h1[9].x, ry = h1[9].y;
      const dx = rx - lx, dy = ry - ly;
      const angle = Math.atan2(-dy, dx);
      steer = Math.max(-1, Math.min(1, angle / (75 * Math.PI / 180)));

      // Center Y of the handlebar, clamped to the usable vertical range
      const centerY = (ly + ry) / 2;
      throttle = Math.max(0, Math.min(1, (0.8 - centerY) / (0.8 - 0.2)));

      driving = true;
      statusParts.push('Throttle:' + Math.round(throttle * 100) + '%  Steer:' + (steer >= 0 ? '+' : '') + Math.round(steer * 100) + '%');

      // Steer authority: full counter-rotation at throttle=0, gentle at throttle=1
      const steerExp = Math.sign(steer) * Math.pow(Math.abs(steer), 1.7);
      const steerScale = 1.4 * (1 - throttle * 0.75);
      left  = Math.max(-1, Math.min(1, throttle + steerExp * steerScale));
      right = Math.max(-1, Math.min(1, throttle - steerExp * steerScale));
    } else if (!tooClose) {
      statusParts.push('Open hands — stopped');
    }
  } else if (steerHands.length === 1) {
    statusParts.push('Need 2 hands to steer');
  }

  drawOverlay(results, steer, throttle, driving);

  checkClap(results);
  handInputs = { left, right, buttons: 0 };
  lastHandDetect = Date.now();
  handStatusEl.textContent = statusParts.length ? statusParts.join('  ') : 'No hands detected';
}

async function initHandTracking() {
  try {
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm"
    );
    handLandmarker = await HandLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
        delegate: "GPU"
      },
      numHands: 2,
      runningMode: "VIDEO",
    });
    handStatusEl.textContent = 'Model ready';
    log('Hand tracking model loaded');
  } catch (e) {
    handStatusEl.textContent = 'Model failed';
    log('Hand tracking error: ' + e.message);
  }
}

let signalingWs = null;
let rtcPc = null;
let localWebcamStarted = false;

async function startLocalWebcam() {
  if (localWebcamStarted) return;
  localWebcamStarted = true;
  try {
    handStream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: 'user' } });
    camVideo.srcObject = handStream;
  } catch (e) {
    localWebcamStarted = false; // allow retry
    log('Local webcam error: ' + e.message);
    handStatusEl.textContent = 'Webcam failed — click Hands to retry';
    modeHandsBtn.textContent = 'Enable Hands';
    return;
  }
  if (!handLandmarker) {
    await initHandTracking();
  }
}

function connectSignaling() {
  if (signalingWs && signalingWs.readyState <= 1) return;
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  signalingWs = new WebSocket(`${proto}://${location.host}?role=driver`);

  signalingWs.onopen = () => {
    setDot(serialDot, 'on');
    serialLabel.textContent = 'Server';
    handStatusEl.textContent = 'Waiting for phone...';
  };

  signalingWs.onmessage = async (e) => {
    const msg = JSON.parse(e.data);
    log('WS recv: ' + msg.type);

    if (msg.type === 'phone-joined') {
      handStatusEl.textContent = 'Phone joined, waiting for stream...';
    } else if (msg.type === 'cf-session') {
      await pullFromCF(msg.sessionId, msg.tracks || []);
    } else if (msg.type === 'phone-left') {
      handStatusEl.textContent = 'Phone disconnected';
      phoneVideo.srcObject = null;
      cameraWrap.classList.remove('active');
      if (inputMode === 'hands') startDemo();
    } else if (msg.type === 'driver-status') {
      driverCountEl.textContent = msg.drivers + ' driver' + (msg.drivers === 1 ? '' : 's');
      hasLock = msg.hasLock;
      inQueue = msg.queuePos >= 0;
      if (msg.name) myNameEl.textContent = msg.name;

      if (msg.hasLock) {
        setDot(lockDot, 'on');
        lockBtn.textContent = 'Release Control';
        queueStatusEl.textContent = 'you have control';
      } else if (msg.queuePos >= 0) {
        setDot(lockDot, 'warn');
        lockBtn.textContent = 'Cancel Request';
        queueStatusEl.textContent = msg.queuePos === 0
          ? 'up next'
          : `queue position ${msg.queuePos + 1}`;
      } else if (msg.locked) {
        setDot(lockDot, 'warn');
        lockBtn.textContent = 'Request Control';
        queueStatusEl.textContent = `${msg.lockHolder} has control · ${msg.queue.length} waiting`;
      } else {
        setDot(lockDot, 'off');
        lockBtn.textContent = 'Request Control';
        queueStatusEl.textContent = 'control is free';
      }
    } else if (msg.type === 'lock-revoked') {
      hasLock = false;
      inQueue = false;
      setDot(lockDot, 'off');
      lockBtn.textContent = 'Request Control';
      queueStatusEl.textContent = 'control revoked by operator';
      countdownBanner.style.display = 'none';
      log('Lock revoked by operator');
    } else if (msg.type === 'lock-denied') {
      log('Lock already held by another driver');
    } else if (msg.type === 'ping') {
      signalingWs.send(JSON.stringify({ type: 'pong' }));
    } else if (msg.type === 'lock-countdown') {
      // handled by countdown UI
      updateCountdown(msg.secondsLeft, msg.hasQueue);
    } else if (msg.type === 'ack') {
      handleAckBytes(msg.bytes);
    } else if (msg.type === 'operator-left') {
      setDot(serialDot, 'off');
      serialLabel.textContent = 'No operator';
      log('Operator disconnected');
    }
  };

  signalingWs.onclose = () => {
    setDot(serialDot, 'warn');
    serialLabel.textContent = 'Reconnecting...';
    hasLock = false;
    setDot(lockDot, 'off');
    lockBtn.textContent = 'Acquire Lock';
    handStatusEl.textContent = 'Signaling disconnected';
    if (rtcPc) { rtcPc.close(); rtcPc = null; }
    phoneVideo.srcObject = null;
    cameraWrap.classList.remove('active');
    setTimeout(connectSignaling, 2000);
  };
}

async function pullFromCF(phoneSessionId, phoneTracks) {
  if (rtcPc) { rtcPc.close(); rtcPc = null; }
  log('Pulling from CF session: ' + phoneSessionId);

  // 1. Create our own CF session
  const session = await fetch('/cf/session/new', { method: 'POST' }).then(r => r.json());
  const mySessionId = session.sessionId;

  // 2. Create local PC
  rtcPc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.cloudflare.com:3478' }] });

  rtcPc.ontrack = (e) => {
    log('Got CF track: ' + e.track.kind);
    if (!phoneVideo.srcObject) phoneVideo.srcObject = new MediaStream();
    phoneVideo.srcObject.addTrack(e.track);
    phoneVideo.play().catch(() => {});
    cameraWrap.classList.add('active');
    handStatusEl.textContent = 'Phone camera streaming';
    stopDemo();
    startLocalWebcam();
    runHandLoop();
  };

  rtcPc.onconnectionstatechange = () => {
    log('RTC state: ' + rtcPc.connectionState);
    if (rtcPc.connectionState === 'disconnected' || rtcPc.connectionState === 'failed') {
      handStatusEl.textContent = 'Stream lost, reconnecting...';
      cameraWrap.classList.remove('active');
      phoneVideo.srcObject = null;
      setTimeout(() => {
        if (signalingWs && signalingWs.readyState === 1 && (!rtcPc || rtcPc.connectionState !== 'connected')) {
          if (rtcPc) { rtcPc.close(); rtcPc = null; }
          signalingWs.send(JSON.stringify({ type: 'request-stream' }));
        }
      }, 3000);
    }
  };

  // 3. Pull the phone's tracks via CF
  const pullResult = await fetch(`/cf/session/${mySessionId}/tracks/new`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      tracks: phoneTracks.map(t => ({
        location: 'remote',
        sessionId: phoneSessionId,
        trackName: t.trackName,
      })),
    }),
  }).then(r => r.json());

  log('CF pull: ' + JSON.stringify(pullResult).slice(0, 120));
  if (pullResult.errorCode) { log('CF pull error: ' + pullResult.errorDescription); return; }

  // 4. Set the offer CF gave us
  await rtcPc.setRemoteDescription({ type: 'offer', sdp: pullResult.sessionDescription.sdp });

  // 5. Create answer
  const answer = await rtcPc.createAnswer();
  await rtcPc.setLocalDescription(answer);

  // 6. Send answer back to CF to complete the pull
  await fetch(`/cf/session/${mySessionId}/renegotiate`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ sessionDescription: { type: 'answer', sdp: answer.sdp } }),
  });

  log('CF pull complete');
}

// Generate QR code pointing to phone.html on the same server
(function renderQR() {
  const phoneUrl = `${location.protocol}//${location.host}/phone.html`;
  const qr = qrcode(0, 'M');
  qr.addData(phoneUrl);
  qr.make();
  const mods = qr.getModuleCount();
  const scale = Math.floor(180 / mods);
  const size = mods * scale;
  const c = document.getElementById('qr-canvas');
  c.width = size;
  c.height = size;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, size, size);
  for (let r = 0; r < mods; r++) {
    for (let col = 0; col < mods; col++) {
      if (qr.isDark(r, col)) {
        ctx.fillStyle = '#000';
        ctx.fillRect(col * scale, r * scale, scale, scale);
      }
    }
  }
})();

let handLoopRunning = false;
function runHandLoop() {
  if (handLoopRunning) return;
  handLoopRunning = true;
  function step() {
    if (inputMode !== 'hands' || !handLandmarker || !handStream) {
      handLoopRunning = false;
      return;
    }
    if (camVideo.readyState >= 2) {
      const results = handLandmarker.detectForVideo(camVideo, performance.now());
      processHands(results);
    }
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function buildFrame(leftFloat, rightFloat, buttons = 0) {
  const l = Math.round(Math.max(-1, Math.min(1, deadzone(leftFloat))) * 127);
  const r = Math.round(Math.max(-1, Math.min(1, deadzone(rightFloat))) * 127);
  const payload = new Uint8Array([
    new Int8Array([l])[0],
    new Int8Array([r])[0],
    buttons & 0xFF,
  ]);
  return new Uint8Array([0xAB, ...payload, crc8(payload)]);
}

function getGamepadInputs(gp) {
  const lt = gp.buttons[6].value;   // left trigger  → left forward
  const rt = gp.buttons[7].value;   // right trigger → right forward
  const rev = gp.buttons[1].pressed; // B button      → reverse both

  return {
    left:    rev ? -lt : lt,
    right:   rev ? -rt : rt,
    buttons: gp.buttons.reduce((mask, b, i) => mask | (b.pressed ? 1 << i : 0), 0),
  };
}

function updateBars(leftFloat, rightFloat) {
  const l = deadzone(leftFloat);
  const r = deadzone(rightFloat);

  if (l >= 0) {
    leftFill.style.height = (l * 50) + '%';
    leftFillNeg.style.height = '0';
  } else {
    leftFill.style.height = '0';
    leftFillNeg.style.height = (-l * 50) + '%';
  }

  if (r >= 0) {
    rightFill.style.height = (r * 50) + '%';
    rightFillNeg.style.height = '0';
  } else {
    rightFill.style.height = '0';
    rightFillNeg.style.height = (-r * 50) + '%';
  }

  leftVal.textContent  = Math.round(l * 127);
  rightVal.textContent = Math.round(r * 127);
}

// --- Demo mode (first-person Three.js sim) ---
const demoCanvas = document.getElementById('demo-canvas');
let demoActive = false;
let demoRenderer = null, demoScene = null, demoCamera = null;
let demoRobotYaw = 0, demoRobotX = 0, demoRobotZ = 0;
let demoAnimId = null;
let demoColliders = [];

function initDemo() {
  if (demoRenderer) return;

  const wrap = document.getElementById('camera-wrap');
  const W = wrap.clientWidth  || 640;
  const H = wrap.clientHeight || 480;

  demoRenderer = new THREE.WebGLRenderer({ canvas: demoCanvas, antialias: true });
  demoRenderer.setSize(W, H);
  demoRenderer.shadowMap.enabled = true;

  demoScene = new THREE.Scene();
  demoScene.background = new THREE.Color(0x111111);
  demoScene.fog = new THREE.Fog(0x111111, 8, 30);

  // Camera (first person, mounted at ~30cm height)
  demoCamera = new THREE.PerspectiveCamera(75, W / H, 0.05, 100);
  demoCamera.position.set(0, 0.3, 0);

  // Lighting
  demoScene.add(new THREE.AmbientLight(0xffffff, 0.4));
  const sun = new THREE.DirectionalLight(0xffffff, 0.8);
  sun.position.set(5, 10, 5);
  sun.castShadow = true;
  demoScene.add(sun);

  // Floor — grid of tiles
  const floorGeo = new THREE.PlaneGeometry(40, 40, 20, 20);
  const floorMat = new THREE.MeshLambertMaterial({ color: 0x1a1a2e, wireframe: false });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  demoScene.add(floor);

  // Grid lines on floor
  const grid = new THREE.GridHelper(40, 40, 0x333366, 0x222244);
  grid.position.y = 0.001;
  demoScene.add(grid);

  // Collidable boxes: {cx, cz, hw, hd} (half-width, half-depth in XZ)
  demoColliders = [];

  // Boundary walls
  const wallMat = new THREE.MeshLambertMaterial({ color: 0x334455 });
  const wallH = 1.5, wallT = 0.3, wallL = 40;
  const wallDefs = [
    { pos: [0, wallH/2,  20], size: [wallL, wallH, wallT] },
    { pos: [0, wallH/2, -20], size: [wallL, wallH, wallT] },
    { pos: [ 20, wallH/2, 0], size: [wallT, wallH, wallL] },
    { pos: [-20, wallH/2, 0], size: [wallT, wallH, wallL] },
  ];
  for (const w of wallDefs) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(...w.size), wallMat);
    m.position.set(...w.pos);
    m.castShadow = true; m.receiveShadow = true;
    demoScene.add(m);
    demoColliders.push({ cx: w.pos[0], cz: w.pos[2], hw: w.size[0]/2, hd: w.size[2]/2 });
  }

  // Random obstacles
  const obsMat = new THREE.MeshLambertMaterial({ color: 0x446655 });
  const rng = (a, b) => a + Math.random() * (b - a);
  for (let i = 0; i < 20; i++) {
    const sw = rng(0.4, 1.2), sd = rng(0.4, 1.2), h = rng(0.3, 1.5);
    const obs = new THREE.Mesh(new THREE.BoxGeometry(sw, h, sd), obsMat);
    let ox, oz;
    do { ox = rng(-18, 18); oz = rng(-18, 18); } while (Math.abs(ox) < 2 && Math.abs(oz) < 2);
    obs.position.set(ox, h/2, oz);
    obs.castShadow = true; obs.receiveShadow = true;
    demoScene.add(obs);
    demoColliders.push({ cx: ox, cz: oz, hw: sw/2, hd: sd/2 });
  }

  // Resize observer
  new ResizeObserver(() => {
    const W2 = wrap.clientWidth, H2 = wrap.clientHeight;
    demoRenderer.setSize(W2, H2);
    demoCamera.aspect = W2 / H2;
    demoCamera.updateProjectionMatrix();
  }).observe(wrap);
}

function startDemo() {
  if (demoActive) return;
  initDemo();
  demoActive = true;
  demoCanvas.style.display = 'block';
  cameraWrap.classList.add('active');
  demoRobotX = 0; demoRobotZ = 0; demoRobotYaw = 0;
  demoCamera.position.set(0, 0.3, 0);

  let last = performance.now();
  function loop(now) {
    if (!demoActive) return;
    const dt = Math.min((now - last) / 1000, 0.05);
    last = now;

    // Tank drive kinematics from handInputs
    const L = handInputs.left, R = handInputs.right;
    const linearV  = (L + R) / 2 * 3;    // m/s
    const angularV = (R - L) / 2 * 3;    // rad/s (positive = turn right)

    demoRobotYaw += angularV * dt;
    demoCamera.quaternion.setFromAxisAngle(new THREE.Vector3(0, 1, 0), demoRobotYaw);

    // Forward vector from camera orientation
    const fwd = new THREE.Vector3(0, 0, -1).applyQuaternion(demoCamera.quaternion);

    const radius = 0.25; // robot collision radius
    const nx = demoRobotX + fwd.x * linearV * dt;
    const nz = demoRobotZ + fwd.z * linearV * dt;

    // AABB collision: try X and Z separately so we can slide along walls
    let tx = nx, tz = demoRobotZ;
    let collX = false;
    for (const c of demoColliders) {
      if (Math.abs(tx - c.cx) < c.hw + radius && Math.abs(tz - c.cz) < c.hd + radius) { collX = true; break; }
    }
    if (collX) tx = demoRobotX;

    let collZ = false;
    for (const c of demoColliders) {
      if (Math.abs(tx - c.cx) < c.hw + radius && Math.abs(nz - c.cz) < c.hd + radius) { collZ = true; break; }
    }
    demoRobotX = tx;
    demoRobotZ = collZ ? demoRobotZ : nz;

    demoCamera.position.set(demoRobotX, 0.3, demoRobotZ);

    demoRenderer.render(demoScene, demoCamera);
    demoAnimId = requestAnimationFrame(loop);
  }
  demoAnimId = requestAnimationFrame(loop);
}

function stopDemo() {
  demoActive = false;
  demoCanvas.style.display = 'none';
  if (!phoneVideo.srcObject) cameraWrap.classList.remove('active');
  if (demoAnimId) { cancelAnimationFrame(demoAnimId); demoAnimId = null; }
}

async function tick() {
  let inputs = null;

  if (inputMode === 'hands') {
    if (Date.now() - lastHandDetect < 500) {
      inputs = handInputs;
      setDot(gamepadDot, 'on');
      gamepadLabel.textContent = 'Hand tracking';
    } else {
      setDot(gamepadDot, 'off');
      gamepadLabel.textContent = 'No hands';
    }
  } else {
    const gp = navigator.getGamepads().find(g => g);
    if (gp) {
      inputs = getGamepadInputs(gp);
      setDot(gamepadDot, 'on');
      gamepadLabel.textContent = gp.id.slice(0, 30);
    }
  }

  if (estopped && inputs) {
    inputs = { left: 0, right: 0, buttons: 0 };
  }

  if (inputs) {
    updateBars(inputs.left, inputs.right);

    const canSend = hasLock && signalingWs && signalingWs.readyState === 1;

    // Radio link status (acks come back from operator)
    if (canSend && lastRadio > 0) {
      const radioDelta = Date.now() - lastRadio;
      smoothRadio = smoothRadio === 0 ? radioDelta : smoothRadio + ALPHA * (radioDelta - smoothRadio);
      const r = Math.round(smoothRadio);
      if (radioFail) {
        setDot(radioDot, 'warn');
        radioLabel.textContent = 'Drop';
      } else if (radioDelta < 200) {
        setDot(radioDot, 'on');
        radioLabel.textContent = String(r).padStart(3) + 'ms';
      } else if (radioDelta < 500) {
        setDot(radioDot, 'warn');
        radioLabel.textContent = String(r).padStart(3) + 'ms';
      } else {
        setDot(radioDot, 'off');
        radioLabel.textContent = String(r).padStart(3) + 'ms';
      }
    } else if (canSend) {
      setDot(radioDot, 'off');
      radioLabel.textContent = '---ms';
    }

    // Arduino round trip
    const since = Date.now() - lastAck;
    if (canSend && lastAck > 0) {
      smoothAck = smoothAck === 0 ? since : smoothAck + ALPHA * (since - smoothAck);
      const a = Math.round(smoothAck);
      if (since < 200) setDot(rtripDot, 'on');
      else if (since < 500) setDot(rtripDot, 'warn');
      else setDot(rtripDot, 'off');
      rtripLabel.textContent = String(a).padStart(3) + 'ms';
    } else if (canSend) {
      setDot(rtripDot, 'off');
      rtripLabel.textContent = '---ms';
    }

    if (canSend) {
      const frame = buildFrame(inputs.left, inputs.right, inputs.buttons & 0xFF);
      signalingWs.send(JSON.stringify({ type: 'frame', data: Array.from(frame) }));
      setDot(streamDot, 'on');
    } else if (!hasLock) {
      setDot(streamDot, 'off');
    }
  } else {
    if (inputMode === 'gamepad') {
      setDot(gamepadDot, 'off');
      gamepadLabel.textContent = 'No gamepad';
    }
    updateBars(0, 0);
  }
  setTimeout(tick, 1000 / RATE_HZ);
}

lockBtn.onclick = () => {
