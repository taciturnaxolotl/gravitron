<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unauthorized</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #c8a85e;
      font-family: 'Georgia', 'Times New Roman', serif;
      text-align: center;
    }
    .message {
      padding: 2rem;
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 400;
    }
    p {
      font-size: 1.2rem;
      color: #888;
      font-style: italic;
    }
    .seal {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="message">
    <div class="seal">&#9888;</div>
    <h1>Thou Art Not Authorized</h1>
    <p>The gates of this machine are barred to thee.</p>
  </div>
</body>
</html>
